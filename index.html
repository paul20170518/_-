    // --- 預設展示訂單 ---
    const DEFAULT_DEMO_ORDERS = [
      { orderId: "demo-1", timestamp: "10:15", name: "王大明", drink: "黑糖厚珍鮮奶茶", sugar: "半糖", ice: "少冰", quantity: 2, totalPrice: 130 },
      { orderId: "demo-2", timestamp: "10:32", name: "張愛莉", drink: "鮮榨紅鑽葡萄柚綠", sugar: "微糖", ice: "去冰", quantity: 1, totalPrice: 65 },
      { orderId: "demo-3", timestamp: "10:48", name: "李科長", drink: "手採阿里山金萱", sugar: "無糖", ice: "溫熱", quantity: 1, totalPrice: 40 },
      { orderId: "demo-4", timestamp: "11:15", name: "陳珊珊", drink: "南島埔里百香雙Q", sugar: "七分糖", ice: "微冰", quantity: 3, totalPrice: 165 },
    ];

    // --- 甜度與冰塊選項 ---
    const SUGAR_OPTIONS = [
      { label: "無糖 (0%)", value: "無糖" },
      { label: "微糖 (30%)", value: "微糖" },
      { label: "半糖 (50%)", value: "半糖" },
      { label: "八分糖 (80%)", value: "七分糖" },
      { label: "正常糖 (100%)", value: "正常糖" }
    ];

    const ICE_OPTIONS = [
      { label: "去冰 (0%)", value: "去冰" },
      { label: "微冰 (30%)", value: "微冰" },
      { label: "少冰 (70%)", value: "少冰" },
      { label: "正常冰", value: "正常冰" },
      { label: "溫熱", value: "溫熱" }
    ];

    // --- 連接狀態指示 ---
    const MODE_LOCAL = "LOCAL";
    const MODE_GAS = "GAS";

    // ==========================================
    //           主 App 整合元件
    // ==========================================
    function App() {
      const [appMode, setAppMode] = useState(MODE_LOCAL);
      const [gasUrl, setGasUrl] = useState(() => {
        return localStorage.getItem("gas_drink_api_url") || "";
      });
      const [showSettings, setShowSettings] = useState(false);
      const [menu, setMenu] = useState(DEFAULT_MENU);
      const [orders, setOrders] = useState([]);
      const [loading, setLoading] = useState(false);
      const [editingOrder, setEditingOrder] = useState(null);
      const [toast, setToast] = useState(null);

      // 臨時 GAS 輸入框狀態
      const [tempUrlInput, setTempUrlInput] = useState(gasUrl);

      // 彈出 Toast 提示
      const showToastMessage = (message, type = "success") => {
        setToast({ id: Date.now(), message, type });
      };

      // 清除 Toast
      useEffect(() => {
        if (toast) {
          const timer = setTimeout(() => {
            setToast(null);
          }, 3500);
          return () => clearTimeout(timer);
        }
      }, [toast]);

      // 初始化載入：如果 localStorage 內有 GAS 網址，自動設置為 GAS 模式並嘗試抓取
      useEffect(() => {
        const storedUrl = localStorage.getItem("gas_drink_api_url");
        if (storedUrl && storedUrl.trim().startsWith("http")) {
          setAppMode(MODE_GAS);
          fetchDataFromSource(storedUrl);
        } else {
          // 首次載入使用 LocalStorage 資料或預設訂單
          setAppMode(MODE_LOCAL);
          const cachedOrders = localStorage.getItem("local_drink_orders");
          if (cachedOrders) {
            setOrders(JSON.parse(cachedOrders));
          } else {
            setOrders(DEFAULT_DEMO_ORDERS);
            localStorage.setItem("local_drink_orders", JSON.stringify(DEFAULT_DEMO_ORDERS));
          }
          showToastMessage("已載入本機示範資料，隨時可以使用！", "info");
        }
      }, []);

      // 核心資料拉取常式
      const fetchDataFromSource = async (targetUrl = gasUrl) => {
        if (!targetUrl || !targetUrl.trim().startsWith("http")) {
          showToastMessage("請先設定有效的 GAS API 網址！", "error");
          setAppMode(MODE_LOCAL);
          return;
        }

        setLoading(true);
        try {
          // 發送 GET 請求
          const response = await fetch(targetUrl, {
            method: "GET",
            mode: "cors"
          });
          
          if (!response.ok) {
            throw new Error(`HTTP status: ${response.status}`);
          }
          
          const result = await response.json();
          
          if (result.menu && result.menu.length > 0) {
            setMenu(result.menu);
          }
          
          if (result.orders) {
            setOrders(result.orders);
            showToastMessage("成功同步線上 Google 試算表訂單！", "success");
          } else {
            setOrders([]);
            showToastMessage("取得資料，今天目前尚無訂單。", "info");
          }
          setAppMode(MODE_GAS);
        } catch (error) {
          console.error("Fetch API error:", error);
          showToastMessage("無法連線至您的 GAS：將自動切換至離線示範模式。", "error");
          
          // 回歸 Local
          setAppMode(MODE_LOCAL);
          const cachedOrders = localStorage.getItem("local_drink_orders");
          if (cachedOrders) {
            setOrders(JSON.parse(cachedOrders));
          } else {
            setOrders(DEFAULT_DEMO_ORDERS);
          }
        } finally {
          setLoading(false);
        }
      };

      // 儲存 GAS 設定
      const handleSaveSettings = (e) => {
        e.preventDefault();
        const trimmed = tempUrlInput.trim();
        if (trimmed === "") {
          localStorage.removeItem("gas_drink_api_url");
          setGasUrl("");
          setAppMode(MODE_LOCAL);
          // 載入快取 Local
          const cachedOrders = localStorage.getItem("local_drink_orders") || JSON.stringify(DEFAULT_DEMO_ORDERS);
          setOrders(JSON.parse(cachedOrders));
          showToastMessage("已清除設定，切換回本機示範模式", "info");
          setShowSettings(false);
        } else if (trimmed.startsWith("http")) {
          localStorage.setItem("gas_drink_api_url", trimmed);
          setGasUrl(trimmed);
          setAppMode(MODE_GAS);
          showToastMessage("設定已儲存！正在連接後端...", "info");
          setShowSettings(false);
          fetchDataFromSource(trimmed);
        } else {
          showToastMessage("連結格式不正確，必須以 http:// 或 https:// 開頭！", "error");
        }
      };

      // 測試連線
      const handleTestConnection = async () => {
        if (!tempUrlInput.trim().startsWith("http")) {
          showToastMessage("請輸入正確的 HTTP / HTTPS 網址！", "error");
          return;
        }
        setLoading(true);
        try {
          const res = await fetch(tempUrlInput, { method: "GET" });
          if (res.ok) {
            const data = await res.json();
            if (data.menu) {
              showToastMessage("連線測試成功！後端通訊精準無誤！", "success");
            } else {
              showToastMessage("已成功連上網址，但似乎非正確的飲料系統資料結構。", "warning");
            }
          } else {
            showToastMessage(`連線被拒：HTTP 狀態碼 ${res.status}`, "error");
          }
        } catch (err) {
          showToastMessage("連線失敗，請檢查網路、網址或 CORS 設定！", "error");
        } finally {
          setLoading(false);
        }
      };

      // 遞交或更新訂單之處理邏輯
      const handleOrderSubmit = async (formData) => {
        setLoading(true);
        const actionType = formData.orderId ? "update" : "create";
        
        const payload = {
          action: actionType,
          data: formData
        };

        if (appMode === MODE_GAS && gasUrl) {
          try {
            // 發送 POST 請求
            // 提示：大部分部署的 GAS 為避免 preflight CORS 阻擋，建議設定 Content-Type 為 text/plain
            const res = await fetch(gasUrl, {
              method: "POST",
              mode: "cors",
              headers: {
                "Content-Type": "text/plain;charset=utf-8"
              },
              body: JSON.stringify(payload)
            });

            const resJson = await res.json();
            if (resJson.status === "success" || resJson.success) {
              showToastMessage(formData.orderId ? "今日訂單已修改成功！" : "恭喜點單完成！下午茶已在路上 ☕️", "success");
              // 成功後，重新拉取最新資料同步
              await fetchDataFromSource();
              setEditingOrder(null);
            } else {
              throw new Error(resJson.message || "GAS 伺服器回傳未明錯誤");
            }
          } catch (err) {
            console.error(err);
            showToastMessage("傳送失敗：將為您暫時保存在本機快取中。", "warning");
            saveToLocalFallback(formData, actionType);
          } finally {
            setLoading(false);
          }
        } else {
          // 本機 Local Fallback 
          setTimeout(() => {
            saveToLocalFallback(formData, actionType);
            setLoading(false);
          }, 350);
        }
      };

      // 本機快取修改與存檔
      const saveToLocalFallback = (formData, actionType) => {
        let updatedOrders = [...orders];
        if (actionType === "create") {
          const newOrder = {
            ...formData,
            orderId: "local-" + Date.now() + "-" + Math.floor(Math.random() * 1000),
            timestamp: new Date().toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" })
          };
          updatedOrders.unshift(newOrder);
          showToastMessage("本機新增成功！(離線示範模式)", "success");
        } else {
          updatedOrders = updatedOrders.map(o => o.orderId === formData.orderId ? { ...o, ...formData } : o);
          showToastMessage("本機修改成功！(離線示範模式)", "success");
        }
        setOrders(updatedOrders);
        localStorage.setItem("local_drink_orders", JSON.stringify(updatedOrders));
        setEditingOrder(null);
      };

      // 刪除訂單
      const handleOrderDelete = async (orderId) => {
        if (!confirm("確定要取消/刪除這筆美味的訂單嗎？")) return;
        setLoading(true);

        const payload = {
          action: "delete",
          data: { orderId }
        };

        if (appMode === MODE_GAS && gasUrl) {
          try {
            const res = await fetch(gasUrl, {
              method: "POST",
              mode: "cors",
              headers: {
                "Content-Type": "text/plain;charset=utf-8"
              },
              body: JSON.stringify(payload)
            });
            const resJson = await res.json();
            if (resJson.status === "success" || resJson.success) {
              showToastMessage("已成功刪除該筆訂單！", "success");
              await fetchDataFromSource();
              if (editingOrder && editingOrder.orderId === orderId) {
                setEditingOrder(null);
              }
            } else {
              throw new Error(resJson.message || "刪除失敗");
            }
          } catch (err) {
            console.error(err);
            showToastMessage("透過 API 刪除失敗，改於本機中移除其記錄。", "warning");
            deleteFromLocal(orderId);
          } finally {
            setLoading(false);
          }
        } else {
          setTimeout(() => {
            deleteFromLocal(orderId);
            setLoading(false);
          }, 200);
        }
      };

      const deleteFromLocal = (orderId) => {
        const updated = orders.filter(o => o.orderId !== orderId);
        setOrders(updated);
        localStorage.setItem("local_drink_orders", JSON.stringify(updated));
        showToastMessage("已從快取移除該筆訂單", "success");
        if (editingOrder && editingOrder.orderId === orderId) {
          setEditingOrder(null);
        }
      };

      // 點擊編輯
      const handleEditRequest = (order) => {
        setEditingOrder(order);
        // 並將螢幕平滑滑動回訂單填寫區 (Desktop/Mobile 適應)
        const element = document.getElementById("order-form-container");
        if (element) {
          element.scrollIntoView({ behavior: "smooth" });
        }
      };

      return (
        <div class="min-h-screen flex flex-col justify-between">
          
          {/* Header 橫幅 */}
          <header class="bg-gradient-to-r from-tea-900 via-[#5F4324] to-tea-900 text-white shadow-xl relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 mix-blend-overlay">
              <div class="absolute w-[300px] h-[300px] bg-tea-300 rounded-full blur-[70px] -top-20 -left-10 animate-pulse"></div>
              <div class="absolute w-[400px] h-[400px] bg-tea-400 rounded-full blur-[100px] -bottom-40 -right-20 animate-pulse" style={{ animationDelay: '1.5s' }}></div>
            </div>

            <div class="max-w-7xl mx-auto px-4 py-6 md:py-8 relative z-10 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
              
              <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gradient-to-br from-tea-100 to-tea-200 text-tea-900 rounded-2xl flex items-center justify-center shadow-lg border-2 border-tea-100/30 shrink-0 transform hover:scale-110 transition-transform duration-300">
                  <CoffeeIcon className="w-8 h-8 text-tea-800" />
                </div>
                <div>
                  <h1 class="text-2xl md:text-3xl font-black tracking-tight font-sans text-[#FFF8F0] flex items-center gap-2">
                    茶巡 <span class="text-xs md:text-sm bg-tea-500/80 text-tea-50 px-2 py-0.5 rounded-full font-normal tracking-wider">下午茶點購系統</span>
                  </h1>
                  <p class="text-stone-300 text-xs md:text-sm mt-1 flex items-center gap-1.5 font-light">
                    <CalendarIcon className="w-3.5 h-3.5 text-tea-300 inline" />
                    今日點單統計與即時點單記錄
                  </p>
                </div>
              </div>

              {/* 右側操作與狀態列 */}
              <div class="flex flex-wrap items-center gap-2.5">
                
                {/* 狀態標籤 */}
                <div class={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border shadow-sm transition-all duration-300 ${
                  appMode === MODE_GAS 
                    ? "bg-emerald-50 text-emerald-700 border-emerald-200" 
                    : "bg-amber-50 text-amber-700 border-amber-200"
                }`}>
                  <span class={`w-2 h-2 rounded-full ${appMode === MODE_GAS ? 'bg-emerald-500 animate-pulse' : 'bg-amber-400'}`}></span>
                  {appMode === MODE_GAS ? "GAS 試算表同步中" : "離線示範/本快模式"}
                </div>

                {/* 重新整理 */}
                {appMode === MODE_GAS && (
                  <button 
                    onClick={() => fetchDataFromSource()}
                    disabled={loading}
                    class="p-2 bg-[#FAF8F5]/10 hover:bg-[#FAF8F5]/20 text-tea-50 disabled:text-tea-300 rounded-xl transition duration-200 border border-white/10"
                    title="重新整理訂單隨時同步"
                    id="btn-refresh"
                  >
                    <svg class={`w-4 h-4 ${loading ? 'animate-spin' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                    </svg>
                  </button>
                )}

                {/* 設定 API 齒輪鈕 */}
                <button 
                  onClick={() => {
                    setTempUrlInput(gasUrl);
                    setShowSettings(!showSettings);
                  }}
                  class={`flex items-center gap-1.5 px-3.5 py-2 rounded-xl text-xs font-semibold tracking-wider transition duration-300 border shadow ${
                    showSettings 
                      ? "bg-tea-200 text-tea-900 border-tea-100" 
                      : "bg-[#FAF8F5]/15 hover:bg-[#FAF8F5]/25 text-tea-50 hover:text-white border-white/20"
                  }`}
                  id="btn-toggle-settings"
                >
                  <SettingsIcon className={`w-4 h-4 ${showSettings ? 'rotate-45' : ''} transition-transform duration-300`} />
                  設定後端
                </button>
              </div>
            </div>

            {/* 下拉式設定面板 */}
            {showSettings && (
              <div class="border-t border-tea-800/65 bg-[#4F361C]/95 text-[#FFF8F0] px-4 py-5 md:py-6 transition-all duration-300 shadow-inner">
                <div class="max-w-4xl mx-auto">
                  <h3 class="text-sm font-bold tracking-wider text-tea-200 uppercase mb-3 flex items-center gap-2">
                    <InfoIcon className="w-4 h-4 text-tea-300" />
                    【系統說明與 Google Apps Script API 串接】
                  </h3>
                  
                  <p class="text-xs text-stone-300 leading-relaxed mb-4">
                    本系統支援透過 Google Apps Script (GAS) 將點單資料寫入特定的 Google 試算表中，達到跨設備多人共同即時統計的效果。
                    若未設定 GAS 網址，系統亦會自動啟動<strong>「本機離線示範模式」</strong>（利用瀏覽器 LocalStorage 儲存），不論填寫、移除皆可流暢執行。若您雙擊此檔案開啟，填妥網址後即刻暢連。
                  </p>

                  <form onSubmit={handleSaveSettings} class="flex flex-col md:flex-row gap-3 items-stretch">
                    <div class="flex-1 relative">
                      <input 
                        type="url"
                        value={tempUrlInput}
                        onChange={(e) => setTempUrlInput(e.target.value)}
                        placeholder="請貼入您的 Google Apps Script 部署 URL (https://script.google.com/macros/s/.../exec)"
                        class="w-full bg-[#36210F] text-stone-100 placeholder-stone-500 px-4 py-2.5 rounded-xl text-xs font-mono border border-tea-800/40 focus:outline-none focus:ring-2 focus:ring-tea-400 focus:border-transparent"
                        id="input-gas-url"
                      />
                    </div>
                    <div class="flex gap-2 shrink-0">
                      <button 
                        type="button" 
                        onClick={handleTestConnection}
                        disabled={loading}
                        class="px-3.5 py-2.5 bg-stone-700 hover:bg-stone-600 active:bg-stone-800 disabled:opacity-50 text-xs font-bold rounded-xl transition duration-150 border border-stone-600"
                        id="btn-test-conn"
                      >
                        測試連線
                      </button>
                      <button 
                        type="submit"
                        class="px-5 py-2.5 bg-tea-500 hover:bg-tea-400 text-white text-xs font-bold rounded-xl shadow-md transition duration-150"
                        id="btn-save-settings"
                      >
                        確認儲存
                      </button>
                    </div>
                  </form>
                  
                  {gasUrl && (
                    <div class="mt-3 text-[11px] text-[#E5DCD0]/80 font-mono tracking-tight flex items-center justify-between">
                      <span class="truncate block max-w-[85%]">目前已啟用 API 聯結：<span class="text-tea-200">{gasUrl}</span></span>
                      <button 
                        type="button" 
                        onClick={() => {
                          setTempUrlInput("");
                          localStorage.removeItem("gas_drink_api_url");
                          setGasUrl("");
                          setAppMode(MODE_LOCAL);
                          const cachedOrders = localStorage.getItem("local_drink_orders") || JSON.stringify(DEFAULT_DEMO_ORDERS);
                          setOrders(JSON.parse(cachedOrders));
                          showToastMessage("已重設為本機示範資料", "info");
                          setShowSettings(false);
                        }}
                        class="text-red-300 hover:text-red-400 font-bold underline"
                      >
                        清空設定
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </header>

          {/* 全域 Loading Bar / 轉圈遮罩 */}
          {loading && (
            <div class="bg-tea-150/40 h-1.5 w-full relative overflow-hidden">
              <div class="h-full bg-tea-600 rounded animate-pulse w-1/3 absolute left-0 top-0" style={{ animation: 'shimmer 1.5s infinite linear' }}></div>
              <style>{`
                @keyframes shimmer {
                  0% { left: -30%; }
                  100% { left: 100%; }
                }
              `}</style>
            </div>
          )}

          {/* Toast 通知小卡 */}
          {toast && (
            <div class="fixed top-6 right-6 z-50 max-w-sm pointer-events-auto transform translate-y-0 transition-transform duration-300">
              <div class={`flex items-start gap-3 p-4 rounded-xl shadow-2xl border ${
                toast.type === "success" ? "bg-emerald-50 text-emerald-800 border-emerald-200" :
                toast.type === "warning" ? "bg-amber-50 text-amber-800 border-amber-200" :
                toast.type === "error" ? "bg-rose-50 text-rose-800 border-rose-200" :
                "bg-sky-50 text-stone-800 border-sky-100"
              }`}>
                <div class="shrink-0 mt-0.5">
                  {toast.type === "success" && <div class="w-4 h-4 bg-emerald-500 text-white rounded-full flex items-center justify-center text-[10px]"><CheckIcon className="w-2.5 h-2.5" /></div>}
                  {toast.type === "error" && <div class="w-4 h-4 bg-rose-500 text-white rounded-full flex items-center justify-center text-[10px] font-bold">!</div>}
                  {toast.type === "warning" && <div class="w-4 h-4 bg-amber-500 text-white rounded-full flex items-center justify-center text-[10px] font-bold">!</div>}
                  {toast.type === "info" && <div class="w-4 h-4 bg-sky-500 text-white rounded-full flex items-center justify-center text-[10px]"><InfoIcon className="w-3 h-3" /></div>}
                </div>
                <div class="flex-1">
                  <p class="text-xs font-semibold leading-relaxed">{toast.message}</p>
                </div>
              </div>
            </div>
          )}

          {/* 主要排版區 */}
          <main class="max-w-7xl mx-auto w-full px-4 py-8 flex-1 grid grid-cols-1 xl:grid-cols-12 gap-8 items-start">
            
            {/* 左半邊：OrderForm 元件容器 (佔 5 Column) */}
            <section id="order-form-container" class="xl:col-span-5 h-auto">
              <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-tea-100/70 hover:shadow-md transition duration-300 space-y-6">
                
                <div class="flex items-center justify-between border-b border-stone-100 pb-4">
                  <h2 class="text-lg md:text-xl font-bold text-stone-800 flex items-center gap-2">
                    <span class="w-2.5 h-5 bg-tea-600 rounded-full inline-block"></span>
                    {editingOrder ? "修改今日點單 🧋" : "填寫下午茶訂單 ✨"}
                  </h2>
                  {editingOrder && (
                    <button 
                      onClick={() => {
                        setEditingOrder(null);
                        showToastMessage("已取消編輯狀態", "info");
                      }}
                      class="text-xs text-stone-400 hover:text-stone-600 underline font-medium"
                      id="btn-cancel-edit"
                    >
                      取消修改
                    </button>
                  )}
                </div>

                <OrderForm 
                  onSubmit={handleOrderSubmit} 
                  initialData={editingOrder} 
                  menu={menu}
                  showToastMessage={showToastMessage}
                />

              </div>
            </section>

            {/* 右半邊：今日點單統計 / 今日訂單列表 (佔 7 Column) */}
            <section class="xl:col-span-7 space-y-8">
              
              {/* 群組統計分析看板 */}
              <OrderSummaryDashboard orders={orders} />

              {/* 訂單明細清單 (OrderList) */}
              <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-tea-100/70 hover:shadow-md transition duration-300">
                <OrderList 
                  orders={orders} 
                  onEdit={handleEditRequest} 
                  onDelete={handleOrderDelete} 
                  editingOrderId={editingOrder ? editingOrder.orderId : null} 
                />
              </div>

            </section>
          </main>

          {/* 頁尾 */}
          <footer class="bg-stone-950 text-stone-500 text-xs py-8 border-t border-stone-900 text-center mt-12">
            <div class="max-w-7xl mx-auto px-4 space-y-2">
              <p class="font-sans font-medium tracking-wider text-stone-400">茶巡・OFFICE TEA-TIME COMPANION</p>
              <p class="text-[11px] font-light">
                本網頁為單一檔案高整合架構，支持離線雙擊點開即享用，或配置 GAS API 便攜線上進行群體多人統計。
              </p>
              <p class="text-[10px] text-stone-600 mt-2">© 2026 茶巡飲料訂購系統. 採用 React + Tailwind 設計</p>
            </div>
          </footer>

        </div>
      );
    }

    // ==========================================
    //    OrderForm 元件 (填寫與修改表單)
    // ==========================================
    function OrderForm({ onSubmit, initialData, menu = [], showToastMessage }) {
      const [name, setName] = useState("");
      const [selectedDrink, setSelectedDrink] = useState("");
      const [sugar, setSugar] = useState("半糖");
      const [ice, setIce] = useState("少冰");
      const [quantity, setQuantity] = useState(1);
      const [rememberName, setRememberName] = useState(true);

      // 選單搜尋與類別分類過濾
      const [searchTerm, setSearchTerm] = useState("");
      const [selectedCategory, setSelectedCategory] = useState("熱選 ⭐️");

      // 列出所有不重複類別
      const categories = useMemo(() => {
        const list = ["熱選 ⭐️"];
        menu.forEach(item => {
          if (item.category && !list.includes(item.category)) {
            list.push(item.category);
          }
        });
        return list;
      }, [menu]);

      // 當切換到編輯模式或取回初始資料時
      useEffect(() => {
        if (initialData) {
          setName(initialData.name || "");
          setSelectedDrink(initialData.drink || "");
          setSugar(initialData.sugar || "半糖");
          setIce(initialData.ice || "少冰");
          setQuantity(initialData.quantity || 1);
        } else {
          // 預設模式：若記住姓名, 自動載入先前輸入姓名
          const cachedName = localStorage.getItem("last_ordered_user_name");
          if (cachedName) {
            setName(cachedName);
          }
          // 預設選取經典的第一項
          if (menu.length > 0) {
            // 預選最熱門茶
            setSelectedDrink(menu[0].name);
          }
          setSugar("半糖");
          setIce("少冰");
          setQuantity(1);
        }
      }, [initialData, menu]);

      // 取得當前選定飲料的單價與描述
      const currentDrinkInfo = useMemo(() => {
        return menu.find(item => item.name === selectedDrink) || { price: 40, description: "精心調配特色茶飲。" };
      }, [selectedDrink, menu]);

      // 計算總計金額
      const liveTotalPrice = useMemo(() => {
        return currentDrinkInfo.price * quantity;
      }, [currentDrinkInfo, quantity]);

      // 過濾後的飲品卡片展示
      const filteredMenu = useMemo(() => {
        return menu.filter(item => {
          const matchSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                              (item.description && item.description.toLowerCase().includes(searchTerm.toLowerCase()));
          
          if (selectedCategory === "熱選 ⭐️") {
            // 預設第一項和一些珍珠鮮奶茶百香雙Q珍珠鮮鮮果類作為精選熱賣
            return matchSearch && (item.name.includes("珍珠") || item.name.includes("茉莉") || item.name.includes("金萱") || item.name.includes("葡萄柚"));
          }
          return matchSearch && item.category === selectedCategory;
        });
      }, [menu, searchTerm, selectedCategory]);

      const handleSubmit = (e) => {
        e.preventDefault();

        if (!name.trim()) {
          showToastMessage("請填入『訂購人姓名』以方便找你付款和發茶喔！", "warning");
          return;
        }
        if (!selectedDrink) {
          showToastMessage("請在下方茶單中選擇想要點購的飲料種類！", "warning");
          return;
        }
        if (quantity < 1) {
          showToastMessage("訂購數量不可小於 1 杯！", "warning");
          return;
        }

        // 儲存常用人名
        if (rememberName) {
          localStorage.setItem("last_ordered_user_name", name.trim());
        }

        const dataPayload = {
          name: name.trim(),
          drink: selectedDrink,
          sugar: sugar,
          ice: ice,
          quantity: quantity,
          totalPrice: liveTotalPrice
        };

        if (initialData && initialData.orderId) {
          dataPayload.orderId = initialData.orderId;
        }

        onSubmit(dataPayload);
      };

      return (
        <form onSubmit={handleSubmit} class="space-y-6">

          {/* 訂購人姓名欄位 */}
          <div class="space-y-2">
            <label class="block text-xs font-bold tracking-wider text-stone-500 uppercase flex items-center justify-between">
              <span>訂購人姓名 <span class="text-tea-600">*</span></span>
              <span class="text-[10px] text-stone-400 font-light">同名請加部門，如: 開發-王小明</span>
            </label>
            <div class="relative">
              <span class="absolute left-3.5 top-2.5 text-stone-400">
                <UserIcon className="w-4 h-4 mt-0.5" />
              </span>
              <input 
                type="text"
                value={name}
                onChange={(e) => setName(e.target.value)}
                placeholder="請輸入您的姓名..."
                class="w-full pl-10 pr-4 py-2.5 bg-tea-50/50 hover:bg-tea-50 focus:bg-white text-stone-800 text-sm font-semibold rounded-xl border border-stone-200 focus:outline-none focus:ring-2 focus:ring-tea-400 focus:border-transparent transition-all duration-200"
                maxLength={30}
                required
                id="inputorder-name"
              />
            </div>
            <label class="flex items-center gap-1.5 cursor-pointer pt-0.5 select-none w-fit">
              <input 
                type="checkbox"
                checked={rememberName}
                onChange={(e) => setRememberName(e.target.checked)}
                class="w-3.5 h-3.5 rounded text-tea-600 focus:ring-tea-500 border-stone-300 accent-tea-600"
              />
              <span class="text-[11px] text-stone-400">在此瀏覽器記住我的名字（下次自動填寫）</span>
            </label>
          </div>

          {/* 飲品點購器：優雅瓦片卡選，擺脫萬惡 select 傳統下拉選單 */}
          <div class="space-y-3 pt-2">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-2">
              <label class="block text-xs font-bold tracking-wider text-stone-500 uppercase">
                選擇手調茶飲 <span class="text-tea-600">*</span>
              </label>
              
              {/* 快速搜尋欄 */}
              <div class="relative w-full md:w-48">
                <span class="absolute left-2.5 top-2 text-stone-400">
                  <SearchIcon className="w-3.5 h-3.5" />
                </span>
                <input 
                  type="text"
                  placeholder="搜尋茶飲名稱..."
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  class="w-full pl-8 pr-2.5 py-1 text-xs bg-stone-50 text-stone-800 rounded-lg border border-stone-200 focus:outline-none focus:ring-1 focus:ring-tea-400 transition"
                />
              </div>

            {/* 茶飲類別滾動導覽 */}

              {categories.map((cat) => (

                  key={cat}
                  type="button"
                  onClick={() => setSelectedCategory(cat)}

                filteredMenu.map((drinkItem) => {
                  const isSelected = selectedDrink === drinkItem.name;
                  return (
                    <div
                      key={drinkItem.name}
                      onClick={() => setSelectedDrink(drinkItem.name)}
                      class={`p-2.5 rounded-xl border text-left cursor-pointer transition duration-150 flex flex-col justify-between h-[82px] relative overflow-hidden group hover:scale-[1.01] ${

                          ? "bg-tea-100/60 border-tea-500 ring-1 ring-tea-400"

                      {/* 選取打勾圈印 */}
                      {isSelected && (
                        <div class="absolute right-1 top-1 w-4 h-4 rounded-full bg-tea-600 text-white flex items-center justify-center text-[10px] shadow">
                          <CheckIcon className="w-2.5 h-2.5" />
                        </div>
                      )}
                      <div>
                        <div class="text-xs font-bold text-stone-800 group-hover:text-tea-800 line-clamp-1 truncate max-w-[85%]">
                          {drinkItem.name}
                        </div>
                        <p class="text-[10px] text-stone-400 line-clamp-2 leading-tight mt-0.5">
                          {drinkItem.description || "經典推薦現泡。"}

                      </div>
                      <div class="text-xs font-bold text-tea-705 mt-1">
                        ${drinkItem.price} <span class="text-[10px] text-stone-400 font-normal">/ 杯</span>
                      </div>
                    </div>

              ) : (
                <div class="col-span-2 py-8 text-center text-xs text-stone-400">
                  查無此茶飲，請調整篩選字詞 🔎
                </div>
              )}
            </div>
            
            {/* 顯示目前選定茶飲特寫 */}
            <div class="bg-tea-50/50 rounded-xl p-3 border border-tea-100 flex items-start gap-2.5">
              <span class="p-1.5 bg-tea-100 text-tea-700 rounded-lg mt-0.5 inline-block">
                <CoffeeIcon className="w-4 h-4" />
              </span>
              <div>
                <p class="text-xs font-bold text-stone-700">目前選擇：<span class="text-tea-800 text-sm font-black">{selectedDrink || "請選取您想喝的茶飲"}</span></p>
                <p class="text-[10px] text-stone-400 font-light leading-tight mt-0.5">{currentDrinkInfo.description}</p>
              </div>
              <div class="ml-auto text-right text-xs font-mono font-bold text-tea-900 self-center shrink-0">
                單杯 ${currentDrinkInfo.price} 元
              </div>
            </div>
          </div>

          {/* 甜度選項按鈕群組 */}
          <div class="space-y-2">
            <label class="block text-xs font-bold tracking-wider text-stone-500 uppercase">
              甜度設定 <span class="text-tea-600">*</span>
            </label>
            <div class="grid grid-cols-5 gap-1.5">
              {SUGAR_OPTIONS.map((opt) => {
                const isActive = sugar === opt.value;
                return (
                  <button
                    key={opt.value}
                    type="button"
                    onClick={() => setSugar(opt.value)}
                    class={`py-2 text-[11px] font-bold rounded-xl transition duration-150 border uppercase ${
                      isActive 
                        ? "bg-amber-600 text-white border-amber-500 shadow-sm font-black scale-105" 
                        : "bg-white text-stone-600 border-stone-200 hover:border-amber-200 hover:bg-stone-50"
                    }`}
                  >
                    {opt.value}
                  </button>
                );
              })}
            </div>
          </div>

          {/* 冰量選項按鈕群組 */}
          <div class="space-y-2">
            <label class="block text-xs font-bold tracking-wider text-stone-500 uppercase">
              水分與冷暖 <span class="text-tea-600">*</span>
            </label>
            <div class="grid grid-cols-5 gap-1.5">
              {ICE_OPTIONS.map((opt) => {
                const isActive = ice === opt.value;
                return (
                  <button
                    key={opt.value}
                    type="button"
                    onClick={() => setIce(opt.value)}
                    class={`py-2 text-[11px] font-bold rounded-xl transition duration-150 border ${
                      isActive 
                        ? "bg-sky-6500 bg-sky-600 text-white border-sky-500 shadow-sm font-black scale-105" 
                        : "bg-white text-stone-600 border-stone-200 hover:border-sky-200 hover:bg-stone-50"
                    }`}
                  >
                    {opt.value}
                  </button>
                );
              })}
            </div>
          </div>

          {/* 數量調整器與金額加總統計 */}
          <div class="flex flex-wrap items-center justify-between gap-4 pt-3 border-t border-stone-100">
            <div>
              <label class="block text-xs font-bold tracking-wider text-stone-500 uppercase mb-1.5">
                訂購數量
              </label>
              
              <div class="inline-flex items-center rounded-xl bg-stone-50 border border-stone-200 p-1">
                <button
                  type="button"
                  onClick={() => setQuantity(q => Math.max(1, q - 1))}
                  class="w-8 h-8 rounded-lg flex items-center justify-center text-stone-500 hover:bg-white hover:text-stone-800 transition"
                  id="btn-qty-minus"
                >
                  <MinusIcon className="w-3.5 h-3.5" />
                </button>
                <span class="w-10 text-center font-mono font-bold text-sm text-stone-800">
                  {quantity}
                </span>
                <button
                  type="button"
                  onClick={() => setQuantity(q => q + 1)}
                  class="w-8 h-8 rounded-lg flex items-center justify-center text-stone-500 hover:bg-white hover:text-stone-800 transition"
                  id="btn-qty-plus"
                >
                  <PlusIcon className="w-3.5 h-3.5" />
                </button>
              </div>
            </div>

            <div class="text-right">
              <span class="block text-[10px] text-stone-400 font-light uppercase">
                實時計價小計
              </span>
              <div class="text-xs text-stone-500 mt-1">
                ${currentDrinkInfo.price} × {quantity}杯
              </div>
              <div class="text-xl font-mono font-black text-tea-900 mt-0.5">
                ${liveTotalPrice} <span class="text-xs text-stone-400 font-normal">元</span>
              </div>
            </div>
          </div>

          {/* 送出與更正大鈕 */}
          <button
            type="submit"
            disabled={!selectedDrink}
            class="w-full mt-4 py-3.5 px-4 bg-gradient-to-r from-tea-700 to-tea-900 hover:from-tea-800 hover:to-stone-900 text-white rounded-2xl font-bold text-sm shadow-md hover:shadow-lg hover:scale-[1.01] transition-all transform duration-150 disabled:opacity-40 disabled:pointer-events-none flex items-center justify-center gap-2"
            id="btn-submit-order"
          >
            <CoffeeIcon className="w-4 h-4 text-tea-200" />
            {initialData ? "確定修改下午茶 ✧" : "好，送出下午茶訂單 ✧"}
          </button>

        </form>
      );
    }

    // ==========================================
    //    OrderSummaryDashboard 元件 (統計看板)
    // ==========================================
    function OrderSummaryDashboard({ orders = [] }) {
      const stats = useMemo(() => {
        let totalCups = 0;
        let totalPrice = 0;
        const peopleMap = new Set();
        const countsMap = {};

        orders.forEach(o => {
          totalCups += (o.quantity || 0);
          totalPrice += (o.totalPrice || 0);
          if (o.name) peopleMap.add(o.name);
          if (o.drink) {
            countsMap[o.drink] = (countsMap[o.drink] || 0) + (o.quantity || 0);
          }
        });

        // 取排序前三名飲料
        const sortedD = Object.entries(countsMap)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 3);

        return {
          totalCups,
          totalPrice,
          totalPeeps: peopleMap.size,
          populars: sortedD
        };
      }, [orders]);

      return (
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          
          {/* Cups ordered */}
          <div class="bg-gradient-to-br from-white to-tea-50/20 p-5 rounded-2xl border border-tea-150/45 shadow-sm hover:translate-y-[-2px] transition-transform duration-200 flex items-center gap-4">
            <div class="w-12 h-12 bg-tea-100 text-tea-800 rounded-xl flex items-center justify-center shadow-inner scale-95 uppercase">
              <span class="font-mono text-xl font-black">杯</span>
            </div>
            <div>
              <p class="text-[10px] text-stone-400 font-bold tracking-wider uppercase">今日累計杯數</p>
              <h3 class="font-mono text-2xl font-black text-tea-900">
                {stats.totalCups} <span class="text-xs text-stone-500 font-normal">杯</span>
              </h3>
            </div>
          </div>

          {/* Sum Price */}
          <div class="bg-gradient-to-br from-white to-tea-50/20 p-5 rounded-2xl border border-tea-150/45 shadow-sm hover:translate-y-[-2px] transition-transform duration-200 flex items-center gap-4">
            <div class="w-12 h-12 bg-amber-100 text-amber-800 rounded-xl flex items-center justify-center shadow-inner">
              <DollarIcon className="w-5 h-5 text-amber-700" />
            </div>
            <div>
              <p class="text-[10px] text-stone-400 font-bold tracking-wider uppercase">今日統計總金額</p>
              <h3 class="font-mono text-2xl font-black text-stone-800">
                ${stats.totalPrice} <span class="text-xs text-stone-500 font-normal">元</span>
              </h3>
            </div>
          </div>

          {/* People Count */}
          <div class="bg-gradient-to-br from-white to-tea-50/20 p-5 rounded-2xl border border-tea-150/45 shadow-sm hover:translate-y-[-2px] transition-transform duration-200 flex items-center gap-4">
            <div class="w-12 h-12 bg-sky-100 text-sky-800 rounded-xl flex items-center justify-center shadow-inner">
              <UserIcon className="w-5 h-5 text-sky-700" />
            </div>
            <div>
              <p class="text-[10px] text-stone-400 font-bold tracking-wider uppercase">參合訂單總人數</p>
              <h3 class="font-mono text-2xl font-black text-stone-800">
                {stats.totalPeeps} <span class="text-xs text-stone-500 font-normal">人</span>
              </h3>
            </div>
          </div>

          {/* 最受歡迎飲料統計條 */}
          {orders.length > 0 && stats.populars.length > 0 && (
            <div class="md:col-span-3 bg-[#FAF8F5] md:bg-stone-50/50 rounded-2xl px-4 py-3.5 border border-stone-200/80 flex flex-col md:flex-row md:items-center justify-between gap-2">
              <span class="text-xs font-bold text-stone-500 flex items-center gap-1 shrink-0">
                <FlameIcon className="w-3.5 h-3.5 text-orange-500 inline fill-orange-500" />
                今日人氣最旺：
              </span>
              <div class="flex flex-wrap gap-2 md:gap-4 items-center flex-1 md:justify-start">
                {stats.populars.map(([drink, cups], idx) => (
                  <div key={drink} class="flex items-center gap-1.5 text-xs">
                    <span class={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold ${
                      idx === 0 ? 'bg-amber-500 text-white' : idx === 1 ? 'bg-stone-300 text-stone-800' : 'bg-[#E3DCD2] text-stone-700'
                    }`}>
                      {idx + 1}
                    </span>
                    <span class="font-semibold text-stone-700 text-[11px] max-w-[120px] truncate">{drink}</span>
                    <span class="font-mono text-[11px] font-bold text-tea-800">({cups}杯)</span>
                  </div>
                ))}
              </div>
            </div>
          )}

        </div>
      );
    }

    // ==========================================
    //    OrderList 元件 (今日已訂單明細列表)
    // ==========================================
    function OrderList({ orders = [], onEdit, onDelete, editingOrderId }) {
      const [filterText, setFilterText] = useState("");
      const [sortBy, setSortBy] = useState("time-desc"); // time-desc, price-desc, qty-desc, name-asc

      // 過濾數據
      const filteredOrders = useMemo(() => {
        return orders.filter(item => {
          const text = filterText.toLowerCase();
          return (item.name && item.name.toLowerCase().includes(text)) || 
                 (item.drink && item.drink.toLowerCase().includes(text)) ||
                 (item.sugar && item.sugar.toLowerCase().includes(text)) ||
                 (item.ice && item.ice.toLowerCase().includes(text));
        });
      }, [orders, filterText]);

      // 排序數據
      const sortedOrders = useMemo(() => {
        const result = [...filteredOrders];
        if (sortBy === "time-desc") {
          // 最早或最晚 (uuid 如果沒有 timestamp 就拿順序，若有則靠 timestamp 判斷)
          // 這邊使用 timestamp 降序
          return result; // 預設就是最新在前
        }
        if (sortBy === "price-desc") {
          return result.sort((a, b) => (b.totalPrice || 0) - (a.totalPrice || 0));
        }
        if (sortBy === "qty-desc") {
          return result.sort((a, b) => (b.quantity || 0) - (a.quantity || 0));
        }
        if (sortBy === "name-asc") {
          return result.sort((a, b) => (a.name || "").localeCompare(b.name || "", "zh-Hant"));
        }
        return result;
      }, [filteredOrders, sortBy]);

      // 取得名字首字，做炫酷頭像
      const getAvatarChar = (fullName) => {
        if (!fullName) return "茶";
        const clean = fullName.trim();
        return clean.charAt(0);
      };

      // 取得一個姓名對應的質感背景色
      const getAvatarColorClass = (name) => {
        const colors = [
          "bg-tea-200 text-tea-900 border-tea-300/60",
          "bg-amber-100 text-amber-800 border-amber-200",
          "bg-sky-150 text-sky-850 bg-sky-100 text-sky-800 border-sky-200",
          "bg-orange-100 text-orange-800 border-orange-200",
          "bg-emerald-100 text-emerald-800 border-emerald-200",
          "bg-indigo-100 text-indigo-800 border-indigo-200"
        ];
        if (!name) return colors[0];
        const sum = name.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
        return colors[sum % colors.length];
      };

      return (
        <div class="space-y-6">
          
          {/* 清單頂部欄 */}
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-stone-100 pb-4">
            <div>
              <h2 class="text-lg md:text-xl font-bold text-stone-800 flex items-center gap-2">
                <span class="w-2.5 h-5 bg-tea-600 rounded-full inline-block"></span>
                下午茶點單清單 🍵
              </h2>
              <p class="text-stone-400 text-xs mt-1">
                目前清單中累計有 <span class="text-tea-800 font-bold">{orders.length}</span> 筆點購紀錄
              </p>
            </div>

            {/* 控制區 */}
            <div class="flex flex-wrap items-center gap-2.5">
              
              {/* 清單搜尋 */}
              <div class="relative w-full md:w-44">
                <span class="absolute left-2.5 top-2.5 text-stone-400">
                  <SearchIcon className="w-3.5 h-3.5" />
                </span>
                <input 
                  type="text"
                  placeholder="篩選得主或茶飲..."
                  value={filterText}
                  onChange={(e) => setFilterText(e.target.value)}
                  class="w-full pl-8 pr-2.5 py-1.5 text-xs bg-stone-50 text-stone-800 rounded-xl border border-stone-200 focus:outline-none focus:ring-1 focus:ring-tea-400 transition"
                  id="search-order-list"
                />
              </div>

              {/* 排序 dropdown */}
              <select
                value={sortBy}
                onChange={(e) => setSortBy(e.target.value)}
                class="bg-stone-50 text-stone-600 text-xs py-1.5 px-3 rounded-xl border border-stone-200 focus:outline-none focus:ring-1 focus:ring-tea-400 cursor-pointer"
                id="select-sort-order"
              >
                <option value="time-desc">時間排序</option>
                <option value="price-desc">金額高至低</option>
                <option value="qty-desc">杯數多至少</option>
                <option value="name-asc">訂購人姓名</option>
              </select>

            </div>
          </div>

          {/* 清單主區 */}
          <div class="space-y-3.5 max-h-[520px] overflow-y-auto pr-1">
            {sortedOrders.length > 0 ? (
              sortedOrders.map((order, idx) => {
                const isUnderEditing = editingOrderId === order.orderId;
                const avatarStyle = getAvatarColorClass(order.name);

                return (
                  <div
                    key={order.orderId || idx}
                    class={`p-4 rounded-2xl border transition duration-200 relative group flex flex-col md:flex-row md:items-center justify-between gap-4 fade-in-up ${
                      isUnderEditing 
                        ? "bg-amber-50/50 border-amber-300 ring-1 ring-amber-300 shadow-sm" 
                        : "bg-white border-stone-200/80 hover:border-tea-200/90 hover:shadow-sm"
                    }`}
                    style={{ animationDelay: `${idx * 0.05}s` }}
                  >
                    
                    {/* 左側：人物與茶飲詳細 */}
                    <div class="flex items-start gap-3.5">
                      
                      {/* 頭像徽章縮寫 */}
                      <div class={`w-11 h-11 rounded-2xl border flex items-center justify-center font-bold text-sm shadow-sm shrink-0 uppercase tracking-widest ${avatarStyle}`}>
                        {getAvatarChar(order.name)}
                      </div>

                      <div class="space-y-1">
                        <div class="flex items-center gap-2">
                          <span class="text-sm font-black text-stone-800">{order.name}</span>
                          <span class="text-[10px] text-stone-400 font-mono font-light">{order.timestamp || "剛才"}</span>
                          {isUnderEditing && (
                            <span class="text-[10px] bg-amber-500 text-white px-1.5 py-0.5 rounded-md font-bold text-center">編輯中</span>
                          )}
                        </div>
                        
                        {/* 飲料名稱 */}
                        <div class="text-sm font-bold text-tea-900 flex items-center gap-1.5">
                          {order.drink}
                        </div>

                        {/* 特調標籤 tags */}
                        <div class="flex flex-wrap items-center gap-1.5 pt-0.5">
                          <span class="px-2 py-0.5 rounded-md text-[10px] font-bold bg-[#FAF2EB] text-amber-700 border border-amber-200/40">
                            {order.sugar}
                          </span>
                          <span class="px-2 py-0.5 rounded-md text-[10px] font-bold bg-[#E6F4FB] text-sky-700 border border-sky-200/40">
                            {order.ice}
                          </span>
                          <span class="px-2 py-0.5 rounded-md text-[10px] font-bold bg-stone-100 text-stone-600">
                            {order.quantity}杯
                          </span>
                        </div>
                      </div>
                    </div>

                    {/* 右側：金額小計與編輯、刪除操作鈕 */}
                    <div class="flex items-center justify-between md:justify-end gap-6 md:text-right border-t md:border-t-0 border-stone-100 pt-3 md:pt-0">
                      
                      <div>
                        <span class="block md:hidden text-[10px] text-stone-400 uppercase">總付款額</span>
                        <p class="font-mono text-lg font-black text-tea-900">
                          ${order.totalPrice} <span class="text-xs text-stone-400 font-normal">元</span>
                        </p>
                      </div>

                      {/* 雙核心按鍵 */}
                      <div class="flex items-center gap-1.5 shrink-0">
                        {/* 編輯 */}
                        <button
                          onClick={() => onEdit(order)}
                          disabled={isUnderEditing}
                          class="p-2 text-stone-400 hover:text-amber-700 hover:bg-amber-100/50 rounded-xl transition-all duration-150 disabled:opacity-30"
                          title="編輯調整這筆訂單"
                          id={`btn-edit-${order.orderId}`}
                        >
                          <EditIcon className="w-4.5 h-4.5" />
                        </button>
                        
                        {/* 刪除 */}
                        <button
                          onClick={() => onDelete(order.orderId)}
                          class="p-2 text-stone-400 hover:text-red-650 hover:text-red-500 hover:bg-rose-100/50 rounded-xl transition-all duration-150"
                          title="取消或刪除訂單"
                          id={`btn-delete-${order.orderId}`}
                        >
                          <TrashIcon className="w-4.5 h-4.5" />
                        </button>
                      </div>

                    </div>

                  </div>
                );
              })
            ) : (
              // 找不到搜尋結果
              filterText ? (
                <div class="text-center py-12 bg-stone-50 rounded-2xl border border-dashed border-stone-200">
                  <p class="text-xs text-stone-400">查無任何與「{filterText}」有關的茶會訂單 ☕️</p>
                  <button 
                    onClick={() => setFilterText("")} 
                    class="mt-2 text-xs text-tea-705 font-bold underline"
                  >
                    重設過濾字詞
                  </button>
                </div>
              ) : (
                // 完美且顯眼引導：當今日完全沒有任何人訂單時
                <div class="text-center py-12 md:py-16 bg-gradient-to-br from-tea-50/20 via-white to-tea-100/10 rounded-2xl border-2 border-dashed border-tea-100 flex flex-col items-center justify-center space-y-4">
                  
                  {/* 可愛向量小茶杯，模擬寂寞氛圍 */}
                  <div class="w-20 h-20 bg-tea-50 text-tea-300 rounded-full flex items-center justify-center shadow-inner relative">
                    <CoffeeIcon className="w-10 h-10 text-tea-200 animate-bounce" />
                    <span class="absolute w-2.5 h-2.5 bg-yellow-400 rounded-full top-2 right-2 animate-ping"></span>
                  </div>

                  <div class="text-center max-w-sm px-4 space-y-1">
                    <h3 class="text-sm font-bold text-stone-850">☕️ 今天還沒有任何人發起點單唷！</h3>
                    <p class="text-xs text-stone-400 leading-relaxed font-light">
                      辦公室咖啡、茶與珍奶大師此時無聲勝有聲。快在左側表單中填入您心儀的一杯，搶先當今天的領頭領航第一單 🥇！
                    </p>
                  </div>
                  
                  <button 
                    onClick={() => {
                      const input = document.getElementById("inputorder-name");
                      if (input) {
                        input.focus();
                        // 滾動回到表單
                        const element = document.getElementById("order-form-container");
                        if (element) {
                          element.scrollIntoView({ behavior: "smooth" });
                        }
                      }
                    }}
                    class="px-5 py-2.5 bg-tea-600 hover:bg-tea-500 text-white font-bold text-xs rounded-xl shadow transition hover:scale-[1.01]"
                    id="btn-lead-order"
                  >
                    搶先發起今日第一杯 🥇
                  </button>

                </div>
              )
            )}
          </div>

        </div>
      );
    }

    // 將 App 元件掛載在 #root 上面
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
